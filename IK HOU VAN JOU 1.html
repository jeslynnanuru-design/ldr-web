<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Untuk Kamu 💖</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial;
    background: black;
    color: pink;
    overflow-x: hidden;
}

/* HALAMAN */
.section { display: none; }
.active { display: block; }

/* HALAMAN 1 CENTER */
#hal1 {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* FOTO */
img {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    margin: 10px auto;
    border: 4px solid pink;
}

/* TEXT */
#textAwal {
    font-size: 22px;
    margin-bottom: 15px;
    text-align: center;
}

#typing, #pesanAkhir {
    text-align: center;
    margin-top: 20px;
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* LOVE */
.heart {
    position: fixed;
    top: -10px;
    color: white;
    animation: jatuh 5s linear infinite;
}

@keyframes jatuh {
    0% { transform: translateY(-10px); }
    100% { transform: translateY(100vh); }
}

/* PAP ANIMASI */
.pap-item {
    opacity: 0;
    transform: translateY(30px) scale(0.9);
    transition: all 1s ease;
    margin-bottom: 20px;
    text-align: center;
}

.pap-item.show {
    opacity: 1;
    transform: translateY(0) scale(1);
}

.pap-item img {
    width: 140px;
    border-radius: 15px;
}

.pap-text {
    margin-top: 8px;
    font-size: 14px;
}
</style>
</head>

<body>

<!-- HALAMAN 1 -->
<div id="hal1" class="section active">
    <h2 id="textAwal"></h2>
    <img id="fotoAku" src="WhatsApp Image 2026-03-25 at 13.56.49.jpeg" style="display:none;">
    <button id="btnNext" onclick="nextPage()" style="display:none;">Klik ya 💖</button>
</div>

<!-- HALAMAN 2 -->
<div id="hal2" class="section" style="text-align:center;">
    <img src="WhatsApp Image 2026-03-25 at 13.56.50 (1).jpeg">
    <h2 id="typing"></h2>
    <button onclick="showCode()">Klik 🤍</button>
</div>

<!-- HALAMAN 3 -->
<div id="hal3" class="section" style="text-align:center;">
    <h2>Masukkan Kode Rahasia 🔐</h2>
    <input type="password" id="kode">
    <br>
    <button onclick="cekKode()">Buka 💌</button>
</div>

<!-- HALAMAN 4 -->
<div id="hal4" class="section">
    <h2 style="text-align:center;">Untuk Kamu 💖</h2>
    <div id="papContainer"></div>
    <p id="pesanAkhir"></p>
</div>

<!-- LAGU -->
<audio id="lagu" autoplay loop>
    <source src="lagu.mp3.mp3" type="audio/mpeg">
</audio>

<script>
// TEXT AWAL
const awalText = "Aku punya sesuatu buat kamu... 💖";
let a = 0;

function ketikAwal() {
    if (a < awalText.length) {
        document.getElementById("textAwal").innerHTML += awalText.charAt(a);
        a++;
        setTimeout(ketikAwal, 50);
    } else {
        document.getElementById("fotoAku").style.display = "block";
        document.getElementById("btnNext").style.display = "block";
    }
}
ketikAwal();

// PINDAH HALAMAN
function nextPage() {
    document.getElementById("hal1").classList.remove("active");
    document.getElementById("hal2").classList.add("active");
    document.getElementById("lagu").play();
    ketikText();
}

// TEXT DIA
const text = "HALLO SAYANGNYA AKUHHH 🫶 ";
let i = 0;

function ketikText() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(ketikText, 50);
    }
}

// LOVE JATUH
function buatLove() {
    const love = document.createElement("div");
    love.classList.add("heart");
    love.innerHTML = "🤍";
    love.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(love);

    setTimeout(() => love.remove(), 5000);
}

// KE HALAMAN KODE
function showCode() {
    document.getElementById("hal2").classList.remove("active");
    document.getElementById("hal3").classList.add("active");
    setInterval(buatLove, 300);
}

// CEK KODE
function cekKode() {
    let kode = document.getElementById("kode").value;

    if (kode.toLowerCase() === "08-01-26") {
        document.getElementById("hal3").classList.remove("active");
        document.getElementById("hal4").classList.add("active");

        tampilPap();
        ketikAkhir();
    } else {
        alert("Kode salah 😭");
    }
}

// PAP + ANIMASI
function tampilPap() {
    const pap = [
        {img: "WhatsApp Image 2026-03-25 at 14.34.01.jpeg", text: "Jangan capek ya kerjanya 🫶"},
        {img: "WhatsApp Image 2026-03-25 at 14.34.02.jpeg", text: "I LOVE U BROO 🤍"}
    ];

    let container = document.getElementById("papContainer");

    pap.forEach((item, index) => {
        let div = document.createElement("div");
        div.classList.add("pap-item");

        let img = document.createElement("img");
        img.src = item.img;

        let text = document.createElement("div");
        text.classList.add("pap-text");
        text.innerText = item.text;

        div.appendChild(img);
        div.appendChild(text);
        container.appendChild(div);

        setTimeout(() => {
            div.classList.add("show");
        }, index * 1500);
    });
}

// PESAN AKHIR
const akhir = "DOA TERBAIK UNTUKMU SAYANG 💙";
let j = 0;

function ketikAkhir() {
    if (j < akhir.length) {
        document.getElementById("pesanAkhir").innerHTML += akhir.charAt(j);
        j++;
        setTimeout(ketikAkhir, 50);
    }
}
</script>

</body>
</html>
